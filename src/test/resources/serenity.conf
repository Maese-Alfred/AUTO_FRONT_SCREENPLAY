serenity {
    take.screenshots = AFTER_EACH_STEP
    project.name = "Kudos Automation - Screenplay"
}

webdriver {
    driver = provided
    provided.type = edge
    provided.edge = config.EdgeDriverProvider
    autodownload = false
}

headless.mode = false

environments {
    default {
        webdriver.base.url = "http://localhost:5173"
    }
}
